<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <style>
    .s{stroke:#fff;stroke-width:6;stroke-linejoin:round}
    .ink{stroke:#16120f;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
    .packet{animation:packet 2.6s linear infinite}
    .packet.p2{animation-delay:-.85s}.packet.p3{animation-delay:-1.7s}
    .line{stroke-dasharray:14 10;animation:dash 1s linear infinite}
    .plot{stroke-dasharray:220;stroke-dashoffset:220;animation:draw 2.2s ease-in-out infinite}
    .polish{animation:polish 1.6s ease-in-out infinite}
    .spark{animation:spark 1.2s steps(2,end) infinite}
    @keyframes packet{0%{transform:translate(34px,64px);opacity:0}12%{opacity:1}34%{transform:translate(120px,64px)}55%{transform:translate(208px,144px)}78%{transform:translate(116px,222px)}100%{transform:translate(34px,64px);opacity:0}}
    @keyframes dash{to{stroke-dashoffset:-24}}
    @keyframes draw{60%,100%{stroke-dashoffset:0}}
    @keyframes polish{50%{transform:translateY(-7px)}}
    @keyframes spark{50%{opacity:.25}}
  </style>
  <rect width="320" height="320" fill="#16120f"/>
  <path class="s line" d="M72 78h112l58 58v76l-74 52H76V78Z" fill="none"/>
  <g transform="translate(34 48)">
    <rect class="s" width="76" height="60" fill="#ffd447"/>
    <text x="17" y="37" fill="#16120f" font-family="Arial" font-weight="900" font-size="20">CSV</text>
  </g>
  <g transform="translate(178 48)">
    <rect class="s" width="96" height="72" fill="#46d9ff"/>
    <path class="ink" d="M18 54V20M18 54h58"/>
    <path class="plot" d="M22 48C38 27 50 42 62 24S76 28 82 18" fill="none" stroke="#e8352f" stroke-width="6"/>
  </g>
  <g transform="translate(188 174)">
    <rect class="s" width="94" height="62" fill="#d8ffd7"/>
    <path class="ink" d="M16 20h62M16 36h48M16 50h58"/>
  </g>
  <g class="polish" transform="translate(50 204)">
    <rect class="s" width="108" height="66" fill="#ff6aaa"/>
    <text x="18" y="29" fill="#16120f" font-family="Arial" font-weight="900" font-size="18">CN</text>
    <path class="ink" d="M44 24h40M18 44h66"/>
    <text x="18" y="61" fill="#16120f" font-family="Arial" font-weight="900" font-size="16">EN</text>
  </g>
  <circle class="packet" r="10" fill="#fff"/>
  <circle class="packet p2" r="10" fill="#ffd447"/>
  <circle class="packet p3" r="10" fill="#46d9ff"/>
  <g class="spark" fill="#fff">
    <rect x="272" y="52" width="12" height="12"/>
    <rect x="38" y="160" width="10" height="10"/>
    <rect x="250" y="258" width="9" height="9"/>
  </g>
  <text x="34" y="304" fill="#fff" font-family="Arial" font-weight="900" font-size="18">DATA TO FIGURE TO TEXT</text>
</svg>
