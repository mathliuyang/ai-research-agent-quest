<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <style>
    .s{stroke:#fff;stroke-width:6;stroke-linejoin:round}.p{animation:move 2.4s linear infinite}.p2{animation-delay:-.8s}.p3{animation-delay:-1.6s}.scan{animation:scan 1.4s ease-in-out infinite}.roller{animation:roll .8s linear infinite;transform-origin:center}.bit{animation:bit 1.1s steps(2,end) infinite}
    @keyframes move{from{transform:translateX(-90px)}to{transform:translateX(250px)}}@keyframes scan{50%{transform:translateY(80px)}}@keyframes roll{to{transform:rotate(360deg)}}@keyframes bit{50%{opacity:.25}}
  </style>
  <rect width="320" height="320" fill="#16120f"/>
  <rect class="s" x="28" y="210" width="264" height="46" fill="#e8352f"/>
  <circle class="s roller" cx="66" cy="233" r="16" fill="#ffd447"/><circle class="s roller" cx="254" cy="233" r="16" fill="#ffd447"/>
  <g class="p"><rect class="s" x="18" y="86" width="58" height="84" fill="#fff"/><text x="27" y="136" font-family="Arial" font-weight="900" font-size="18" fill="#16120f">PDF</text></g>
  <g class="p p2"><rect class="s" x="18" y="86" width="58" height="84" fill="#ffd447"/><text x="27" y="136" font-family="Arial" font-weight="900" font-size="18" fill="#16120f">PDF</text></g>
  <g class="p p3"><rect class="s" x="18" y="86" width="58" height="84" fill="#46d9ff"/><text x="27" y="136" font-family="Arial" font-weight="900" font-size="18" fill="#16120f">PDF</text></g>
  <rect class="s" x="104" y="50" width="112" height="154" fill="none"/>
  <rect class="scan" x="114" y="70" width="92" height="14" fill="#1fbf75"/>
  <text class="bit" x="128" y="190" fill="#fff" font-family="Consolas" font-weight="900" font-size="18">0101 CSV</text>
  <text x="58" y="292" fill="#fff" font-family="Arial" font-weight="900" font-size="24">PDF → CSV/TXT</text>
</svg>
