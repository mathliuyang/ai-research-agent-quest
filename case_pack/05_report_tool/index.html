<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Research Tool</title>
  <style>
    :root{--ink:#111;--paper:#fff3bf;--blue:#8ed3ff;--green:#75d6a3}
    body{margin:0;background:var(--paper);font-family:Arial,"Microsoft YaHei",sans-serif;color:var(--ink)}
    main{max-width:980px;margin:0 auto;padding:36px 20px}
    h1{font-size:56px;line-height:.95;margin:0 0 18px}
    .grid{display:grid;grid-template-columns:320px 1fr;gap:18px}
    .card{border:4px solid var(--ink);background:white;box-shadow:7px 7px 0 var(--ink);padding:18px}
    label{font-weight:900}.value{font-size:38px;font-weight:1000}
    input{width:100%}.bar{height:28px;border:3px solid var(--ink);background:var(--blue);margin:12px 0}.fill{height:100%;background:var(--green);width:40%}
    .tip{font-size:24px;font-weight:900}
    @media(max-width:800px){.grid{grid-template-columns:1fr}h1{font-size:42px}}
  </style>
</head>
<body>
<main>
  <h1>参数影响<br>快速展示器</h1>
  <div class="grid">
    <section class="card">
      <label for="alpha">alpha</label>
      <input id="alpha" type="range" min="0" max="100" value="42">
      <div class="value" id="value">0.42</div>
      <p>移动滑块，模拟参数对误差和训练策略的影响。</p>
    </section>
    <section class="card">
      <h2>Relative Error</h2>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <p class="tip" id="tip">推荐：保持中等正则强度。</p>
    </section>
  </div>
</main>
<script>
  const alpha=document.getElementById("alpha");
  const value=document.getElementById("value");
  const fill=document.getElementById("fill");
  const tip=document.getElementById("tip");
  function update(){
    const v=Number(alpha.value)/100;
    value.textContent=v.toFixed(2);
    const error=Math.round((0.12+Math.abs(v-0.48)*0.9)*100);
    fill.style.width=Math.min(96,error)+"%";
    tip.textContent=v<0.25?"推荐：增大约束权重。":v>0.75?"推荐：降低正则强度。":"推荐：保持中等正则强度。";
  }
  alpha.addEventListener("input",update);update();
</script>
</body>
</html>
